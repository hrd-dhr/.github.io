<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Scientist Planner</title>
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span class="logo-text">Urban Scientist Planner</span>
                </div>
                <div class="header-actions">
                    <span id="plan-status" class="plan-status hidden">
                        <span class="status-dot"></span>
                        <span class="status-text"></span>
                    </span>
                    <button id="copy-btn" class="btn btn-secondary btn-icon hidden" title="Copy plan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                        Copy
                    </button>
                    <button id="new-plan-btn" class="btn btn-secondary" title="Create new plan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        New Plan
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Welcome Screen (shown when no plan) -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-card">
                    <h1>Generate Your Research Plan</h1>
                    <p class="welcome-desc">
                        Enter your research idea and dataset description below.
                        Claude will generate a comprehensive research plan for your urban science project.
                    </p>
                    <div class="welcome-input-container">
                        <textarea
                            id="welcome-input"
                            class="main-input"
                            placeholder="Describe your research idea and dataset...&#10;&#10;Example: I want to study how urban green space accessibility affects resident well-being in Shanghai..."
                            rows="8"
                        ></textarea>
                        <button id="generate-btn" class="btn btn-primary btn-large">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                            Generate Plan
                        </button>
                    </div>
                </div>
            </div>

            <!-- Plan View (hidden initially) -->
            <div id="plan-view" class="plan-view hidden">
                <div class="plan-container">
                    <div id="plan-content" class="plan-content">
                        <!-- Plan content will be rendered here -->
                    </div>
                    <div id="streaming-cursor" class="streaming-cursor hidden"></div>
                </div>

                <!-- Feedback Area -->
                <div class="feedback-area">
                    <div class="feedback-container">
                        <textarea
                            id="feedback-input"
                            class="feedback-input"
                            placeholder="Provide feedback to refine the plan..."
                            rows="1"
                        ></textarea>
                        <button id="send-feedback-btn" class="btn btn-primary send-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p class="loading-text">Generating research plan...</p>
            </div>
        </div>
    </div>

    <script src="app.js?v=20260603-v2"></script>
</body>
</html>
