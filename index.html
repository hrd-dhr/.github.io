<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Scientist Planner</title>
    <link rel="stylesheet" href="style.css">
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <span class="logo-text">Urban Scientist Planner</span>
                </div>
                <button id="new-conversation-btn" class="btn btn-secondary" title="Start new conversation">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New Plan
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Welcome Screen (shown when no messages) -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-card">
                    <h1>Generate Your Research Plan</h1>
                    <p class="welcome-desc">
                        Enter your research idea and dataset description below.
                        Claude will generate a comprehensive research plan for your urban science project.
                    </p>
                    <div class="welcome-input-container">
                        <textarea
                            id="welcome-input"
                            class="main-input"
                            placeholder="Describe your research idea and dataset...&#10;&#10;Example: I want to study how urban green space accessibility affects resident well-being in Shanghai. The dataset includes POI data for parks, residential buildings, and demographic survey data from 2020-2024..."
                            rows="8"
                        ></textarea>
                        <button id="generate-btn" class="btn btn-primary btn-large">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                            Generate Plan
                        </button>
                    </div>
                </div>
            </div>

            <!-- Conversation View (hidden initially) -->
            <div id="conversation-view" class="conversation-view hidden">
                <div id="messages-container" class="messages-container">
                    <!-- Messages will be dynamically inserted here -->
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <textarea
                            id="chat-input"
                            class="chat-input"
                            placeholder="Provide feedback on the plan..."
                            rows="1"
                        ></textarea>
                        <button id="send-btn" class="btn btn-primary send-btn" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p class="loading-text">Generating research plan...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
